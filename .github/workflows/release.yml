name: Release

on:
  push:
    branches:
      - main
      - beta
  # Weekly roll-up of the fix(deps) commits that .releaserc.js suppresses on
  # push, promoted into a single patch release. GitHub only fires schedule
  # from the default branch, so this sweeps main only; use the manual trigger
  # below to sweep beta.
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC — weekly dependency roll-up
  # Also sets RELEASE_DEPS, so a manual run is an on-demand dependency sweep
  # (and the only way to promote beta's suppressed fix(deps) commits).
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: jabrown93/ci/.github/workflows/docker-release.yml@63fdb1321ea7e94b330b23d87a9c9961ed6b86b5 # workflows-v1.0.0
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      image: ghcr.io/jabrown93/artwork-uploader
      # .releaserc.js's @semantic-release/exec plugin isn't in the action's
      # bundled set (commit-analyzer/release-notes-generator/changelog/git/github).
      extra-plugins: |
        @semantic-release/exec@7
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
