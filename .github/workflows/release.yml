name: Release

on:
  push:
    branches:
      - main
      - beta

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: jabrown93/.github/.github/workflows/docker-release.yml@0bf454f053aea7af353980597006ec03b3ca9870 # v1.4.0
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      image: ghcr.io/jabrown93/artwork-uploader
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
